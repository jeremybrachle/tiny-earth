# Tiny Earth — planet configuration
# WARNING: chunk_size is frozen once Phase 2 begins. Changing it requires
# regenerating all chunk files. See docs/adr/004-chunk-format.md.

planet:
  resolution: 256
  chunk_size: 16       # voxels per chunk edge — DO NOT CHANGE after Phase 2
  radius_scale: 1.0    # display size multiplier; planet_radius = resolution × radius_scale
                       # change freely — only requires re-running export.py, not the full pipeline

compression:
  top_n: 200           # default feature count cutoff for the scored GeoJSON export
  min_per_continent: 1 # minimum features retained per continent regardless of score

scoring:
  w_pop: 0.4           # weight: log(population + 1)
  w_sal: 0.3           # weight: cultural_salience_index (Wikipedia pageviews)
  w_uniq: 0.2          # weight: geographic_uniqueness (inverse local density)
  w_conn: 0.1          # weight: transport_hub_rank (airport/rail)

output:
  geojson: data/exports/features.geojson
  chunks: engine/planet/faces

cache:
  osm_ttl_days: 7
  wiki_ttl_days: 30
  etopo_ttl_days: 365
