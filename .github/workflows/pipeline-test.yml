name: Pipeline Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-phase3.txt -r requirements-phase4.txt

      - name: Run tests
        working-directory: pipeline
        run: pytest tests/ -v --tb=short
